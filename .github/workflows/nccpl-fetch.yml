name: NCCPL Daily Fetch

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run NCCPL scraper
        run: node scripts/fetch-nccpl-foreign-activity.mjs --force

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data/nccpl/foreign-investor-activity.latest.json
          git commit -m "Update NCCPL foreign activity data" || echo "No changes"
          git push
